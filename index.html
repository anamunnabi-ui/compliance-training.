<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Compliance & Onboarding Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .option-btn:disabled { cursor: not-allowed; }
        .correct { background-color: #10b981 !important; color: white; border-color: #059669 !important; }
        .incorrect { background-color: #ef4444 !important; color: white; border-color: #dc2626 !important; }
        .progress-bar { transition: width 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">
    <div id="app" class="max-w-3xl mx-auto px-4 py-8">
        <!-- Start Screen -->
        <div id="start-screen" class="bg-white rounded-2xl shadow-xl p-8 text-center">
            <h1 class="text-3xl font-bold text-slate-800 mb-4">KYC/KYB Compliance Quiz</h1>
            <p class="text-slate-600 mb-8 text-lg">Test your knowledge on onboarding requirements for France (FR), Spain (ES), USA (US), and Ireland (IE).</p>
            <div class="grid grid-cols-2 gap-4 mb-8 text-left">
                <div class="p-4 bg-blue-50 rounded-lg border border-blue-100">
                    <span class="font-bold text-blue-800 block">60 Questions</span>
                    <span class="text-sm text-blue-600 italic">Eligibility & Documents</span>
                </div>
                <div class="p-4 bg-purple-50 rounded-lg border border-purple-100">
                    <span class="font-bold text-purple-800 block">4 Regions</span>
                    <span class="text-sm text-purple-600 italic">FR, ES, US, IE</span>
                </div>
            </div>
            <button id="start-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-8 rounded-xl text-xl transition transform hover:scale-105 active:scale-95 shadow-lg">
                Start Training Quiz
            </button>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="hidden">
            <div class="flex justify-between items-center mb-4">
                <span id="question-count" class="text-sm font-semibold text-slate-500 uppercase tracking-wider font-mono">Question 1 / 60</span>
                <span id="score-display" class="text-sm font-semibold text-indigo-600 font-mono">Score: 0</span>
            </div>
            
            <div class="w-full bg-slate-200 h-2 rounded-full mb-8 overflow-hidden">
                <div id="progress" class="bg-indigo-600 h-full progress-bar" style="width: 0%"></div>
            </div>

            <div class="bg-white rounded-2xl shadow-xl p-8 mb-6">
                <h2 id="question-text" class="text-xl font-bold text-slate-800 mb-6"></h2>
                <div id="options-container" class="space-y-3">
                    <!-- Options injected here -->
                </div>
            </div>

            <div id="feedback" class="hidden rounded-xl p-4 mb-6 transition-all duration-300">
                <p id="feedback-text" class="font-medium"></p>
            </div>

            <button id="next-btn" class="hidden w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 px-8 rounded-xl transition shadow-lg">
                Next Question
            </button>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="hidden bg-white rounded-2xl shadow-xl p-8 text-center">
            <h2 class="text-3xl font-bold text-slate-800 mb-2">Quiz Complete!</h2>
            <div id="score-circle" class="w-32 h-32 rounded-full border-8 border-indigo-600 flex items-center justify-center mx-auto my-8">
                <span id="final-score" class="text-3xl font-bold text-slate-800">0%</span>
            </div>
            <p id="result-message" class="text-slate-600 mb-8 text-lg font-medium"></p>
            <button id="restart-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-8 rounded-xl transition shadow-lg">
                Restart Training
            </button>
        </div>
    </div>

    <script>
        const quizData = [
            // FRANCE
            { q: "True or False: The Tax Identification Number (TIN) in France is the same as the SIREN number.", a: ["True", "False"], c: 1, e: "The SIREN is for business identification; the TIN is for tax purposes. While related, they are distinct identifiers." },
            { q: "To be accepted as proof of incorporation, a French Kbis must be from the last:", a: ["1 month", "3 months", "6 months", "12 months"], c: 1, e: "Standard policy requires Kbis extracts to be less than 3 months old to ensure the company status is current." },
            { q: "If a company is incorporated < 1 week ago and Kbis is missing, you should:", a: ["Reject", "Ask user to upload to Infogreffe", "Accept a screenshot of the official application", "Skip the section"], c: 2, e: "For very new companies, a screenshot of the filing or confirmation from Infogreffe is acceptable temporarily." },
            { q: "In French business terminology, what does the status 'Radiée' mean?", a: ["Active", "Dormant", "Struck off / Dissolved", "Under Investigation"], c: 2, e: "'Radiée' indicates the company has been removed from the registry." },
            { q: "In a French Corporate Soletrader account, whose name must be used as the account name?", a: ["The Business Name", "The Individual's Name", "Both Business and Individual", "The SIREN number"], c: 1, e: "For soletraders, the legal entity name is the individual's full name." },
            { q: "Is a discrepancy between 'Ayush Bin Dhurka' (RBE) and 'Ayush Dhurka' (BO) considered material?", a: ["Yes", "No"], c: 0, e: "Missing name components like 'Bin' constitute a material discrepancy in AML/KYC checks." },
            { q: "What is the correct digit count for a French SIREN number?", a: ["8 digits", "9 digits", "10 digits", "14 digits"], c: 1, e: "SIREN is 9 digits. SIRET is 14 digits (SIREN + 5-digit NIC)." },
            { q: "What is the primary dictionary used to cross-reference French legal types?", a: ["INSEE Nomenclature", "CRO List", "Companies House", "Middesk"], c: 0, e: "INSEE provides the official classification for French legal structures." },
            { q: "As of July 2024, where should agents first look to download the Kbis/RBE?", a: ["User upload", "SOURCES in Backoffice", "Google Search", "Email Attachments"], c: 1, e: "Internal 'SOURCES' tools provide verified registry extracts automatically." },
            { q: "If the QES status is 'In Progress', an L0 analyst should:", a: ["Fail the case", "Wait 1 hour", "Escalate to L1", "Do nothing / Wait for auto-update"], c: 3, e: "L0 analysts should not interfere with automated QES processes while 'In Progress'." },
            { q: "For France, UBOs must be verified if they own equal to or greater than:", a: ["10%", "20%", "25%", "50%"], c: 2, e: "The standard AML threshold for UBO identification in France is 25% ownership or control." },
            { q: "If a UBO is on the RBE but missing in BO, the agent should:", a: ["Reject the account", "Add the UBO and reach out for details", "Ignore the UBO", "Ask L2"], c: 1, e: "Agents must align the Backoffice with the registry and then verify the newly added individual." },
            { q: "If a French UBO has a nationality from a High-Risk country (FCCR), is reporting the discrepancy mandatory?", a: ["No", "Only if over 50%", "Yes", "Only for US citizens"], c: 2, e: "High-risk nationalities trigger mandatory reporting and enhanced due diligence." },
            { q: "What is the minimum age for a Director to be eligible in France?", a: ["16", "18", "21", "No minimum"], c: 1, e: "Directors must be of legal age (18) to enter into binding contracts." },
            { q: "Is a registered address in 'Réunion' considered eligible for the France branch?", a: ["Yes", "No"], c: 0, e: "Réunion is a French overseas department and is considered part of France for onboarding." },

            // SPAIN
            { q: "What are the two common names for a Spanish Business Tax Number?", a: ["SIREN/SIRET", "NIF/CIF", "EIN/SSN", "CRO/RBO"], c: 1, e: "NIF (Número de Identificación Fiscal) replaced the old CIF (Código de Identificación Fiscal)." },
            { q: "Which Spanish document contains 'Articulos' and must NOT be a 'Copia Simple'?", a: ["Modelo 200", "Escritura de Constitución", "DNI", "NIE"], c: 1, e: "The Escritura (Deed) is the primary incorporation document; a 'Copia Simple' is not an authorized copy." },
            { q: "What does 'Domicilio Social' usually refer to in Spain?", a: ["Registered Address", "Operating Address", "Personal Address", "P.O. Box"], c: 0, e: "'Domicilio Social' is the legal registered address of the company." },
            { q: "What is the personal ID code for a Spanish National called?", a: ["NIE", "NIF", "DNI", "CIF"], c: 2, e: "DNI is the Documento Nacional de Identidad." },
            { q: "What is the personal ID code for a foreign national residing in Spain?", a: ["DNI", "NIE", "SSN", "NIF"], c: 1, e: "NIE (Número de Identidad de Extranjero) is issued to non-Spaniards." },
            { q: "Can SSKYC be used to validate a Spanish Power of Attorney (PoA) document?", a: ["Yes", "No", "Only for Soletraders", "Only for Banks"], c: 1, e: "PoA documents usually require manual verification by specialized analysts." },
            { q: "What is the Spanish term for 'Joint Directors'?", a: ["Administrador Unico", "Administrador Mancomunado", "Administrador Solidario", "Socio Unico"], c: 1, e: "Mancomunado directors must act together to bind the company." },
            { q: "If a company is 'Mancomunado', a consent letter must be signed by:", a: ["The applicant only", "The other directors", "A Notary", "A Lawyer"], c: 1, e: "Since they must act jointly, the other joint directors must provide consent." },
            { q: "Can CNAE codes found in the Escritura be used to verify Nature of Business?", a: ["Yes", "No", "Only if they match Google", "Only for US branches"], c: 0, e: "CNAE codes are official industry classification codes used in Spanish deeds." },
            { q: "What is the name of the Spanish Beneficial Ownership certificate?", a: ["Kbis", "RBE", "Certificación de titularidades reales", "EIN Letter"], c: 2, e: "This is the specific registry document for UBOs in Spain." },
            { q: "What does the term 'Socio Unico' imply regarding ownership?", a: ["0% ownership", "25% ownership", "50% ownership", "100% ownership"], c: 3, e: "'Socio Unico' means 'Single Shareholder' (100% owner)." },
            { q: "True or False: A video selfie is mandatory for all business users in Spain.", a: ["True", "False"], c: 0, e: "Spanish regulations strictly require video identification (Video KYC) for AML compliance." },
            { q: "Why is a Spanish Passport alone often insufficient for Applicant verification?", a: ["It is not a legal document", "It lacks the DNI/Personal code", "It expires too quickly", "It has no photo"], c: 1, e: "A DNI card is usually required because passports don't always list the fiscal ID number needed for Spanish systems." },
            { q: "From which year should a Modelo 200 be accepted if today is Sept 2025?", a: ["2023", "2024", "2022", "2025"], c: 1, e: "Modelo 200 is the annual tax return; the 2024 filing is the most recent available in late 2025." },
            { q: "Which AI tool version is specified for extracting data from Spanish Escrituras?", a: ["GPT-4", "Gemini 1.5", "Gemini 2.5", "Claude 3"], c: 2, e: "The workflow specifically utilizes Gemini 2.5 for high-accuracy document extraction." },

            // US
            { q: "US registration numbers are commonly referred to as:", a: ["CRO", "EIN", "SIREN", "NIF"], c: 1, e: "EIN stands for Employer Identification Number." },
            { q: "Which IRS form is the 'Original EIN confirmation' letter?", a: ["CP 575", "147C", "W-9", "SS-4"], c: 0, e: "CP 575 is the letter mailed by the IRS when an EIN is first issued." },
            { q: "Which IRS form is the 'Replacement EIN letter'?", a: ["CP 575", "W-2", "147C", "1099"], c: 2, e: "147C is the official confirmation letter issued if the original CP 575 is lost." },
            { q: "Which third-party integration is used to verify US Business Names and TINs?", a: ["Infogreffe", "Middesk", "Socure", "CRO"], c: 1, e: "Middesk is the primary provider for US business verification data." },
            { q: "Why is 45 days the threshold for checking new EINs in the IRS database?", a: ["IRS website is slow", "Database takes 45 days to update", "Middesk has a delay", "User needs 45 days to pay"], c: 1, e: "It takes the IRS approximately 45 days to synchronize new EINs into their public verification database." },
            { q: "If a US business is < 40 days old and EIN is not found, what is the action?", a: ["Reject", "Accept anyway", "Snooze/Auto-tag for later", "Ask for a bank statement"], c: 2, e: "Since the 45-day window hasn't passed, the case should be delayed rather than failed." },
            { q: "Can an US 'Operating Address' be a UPS Store address?", a: ["Yes", "No"], c: 1, e: "UPS Stores and P.O. Boxes are not eligible as operating addresses." },
            { q: "True or False: A US Nexus check is required if the applicant is a US resident.", a: ["True", "False"], c: 0, e: "US residency for a user of a non-US entity triggers a Nexus (connection) review." },
            { q: "Which address type often triggers a US Nexus review?", a: ["Home Address", "P.O. Box", "Registered Agent address", "UPS Store"], c: 2, e: "A Registered Agent address in the US for a foreign entity suggests a legal 'Nexus'." },
            { q: "Which tool is used for personal code/SSN verification in the US?", a: ["Middesk", "Socure", "LexisNexis", "Onfido"], c: 1, e: "Socure is the standard tool for verifying individual identities and SSNs in the US." },
            { q: "True or False: US residents must provide an SSN or ITIN.", a: ["True", "False"], c: 0, e: "A Social Security Number (SSN) or Individual Taxpayer Identification Number (ITIN) is mandatory for US tax reporting." },
            { q: "For a US entity, how many directors must reside in a supported country?", a: ["At least 1", "All of them", "None", "At least 50%"], c: 0, e: "At least one director must be in a country supported by Revolut's US branch." },
            { q: "Can Revolut onboard a US customer if a 30% shareholder is a 'Shell Company'?", a: ["Yes", "No"], c: 1, e: "Shell companies (no active business/assets) are generally prohibited for onboarding." },
            { q: "Which code system does Middesk use for US Industry Classification?", a: ["CNAE", "SIC / NAICS", "NACE", "ISIC"], c: 1, e: "North American Industry Classification System (NAICS) and Standard Industrial Classification (SIC) are US standards." },
            { q: "What two references in an address make it ineligible for US branches?", a: ["Avenue or Road", "P.O. Box or C/O", "Suite or Floor", "Zip code or City"], c: 1, e: "Care Of (C/O) and P.O. Boxes are not accepted as physical operating addresses." },

            // IRELAND
            { q: "True or False: New Soletraders are currently supported for onboarding in the Ireland branch.", a: ["True", "False"], c: 1, e: "Check current product availability; often new Soletraders in IE have restricted onboarding compared to LTDs." },
            { q: "What is the name of the official Irish business registry?", a: ["Companies House", "CRO (Companies Registration Office)", "CORE", "Infogreffe"], c: 1, e: "The CRO is the statutory body for registering companies in Ireland." },
            { q: "What is the name of the Irish Beneficial Ownership registry?", a: ["RBE", "RBO (Register of Beneficial Ownership)", "UBO-List", "CORE"], c: 1, e: "The RBO is specifically for beneficial ownership information in Ireland." },
            { q: "What is the format for an Irish CRO number?", a: ["9 digits", "6-7 digits", "Alpha-numeric", "14 digits"], c: 1, e: "Irish CRO numbers are typically 6 or 7 digits long." },
            { q: "Irish nationals living in the UK do not need a visa because of the:", a: ["GDPR", "Common Travel Area (CTA)", "EU Directive", "Brexit"], c: 1, e: "The CTA allows Irish and UK citizens to live/work in each other's countries without visas." },
            { q: "What is the UBO percentage threshold for Ireland?", a: ["10%", "20%", "25%", "Over 25%"], c: 3, e: "In Ireland, anyone owning more than 25% (25% + 1 share) is a UBO." },
            { q: "Are Partnerships present in the Irish RBO registry?", a: ["Yes", "No"], c: 1, e: "Only corporate entities (like Limited companies) are required to file with the RBO; partnerships usually are not." },
            { q: "If no UBO owns > 25% in Ireland, who should be documented as the UBO?", a: ["The youngest director", "The oldest director", "CEO / Senior Managing Official", "No one"], c: 2, e: "Under AML rules, if no owner meets the threshold, senior management is recorded as the control UBO." },
            { q: "Does RBO reporting apply to Periodic Reviews or only Onboarding?", a: ["Onboarding only", "Both Onboarding and Periodic Reviews", "Periodic Reviews only", "Neither"], c: 1, e: "Registry alignment must be verified both at start and during ongoing monitoring." },
            { q: "What should you report if no RBO details exist but UBOs are in the BO?", a: ["Identity Fraud", "Discrepancy / Non-compliance with RBO filing", "Nothing", "Wrong Address"], c: 1, e: "Failure to register with RBO is a regulatory breach that must be noted as a discrepancy." },
            { q: "Which nationality currently has 'Temporary Protection' extended to March 2026?", a: ["Syrian", "Ukrainian", "Afghan", "Palestinian"], c: 1, e: "Due to the ongoing conflict, Ukrainian nationals have extended temporary protection status in the EU/IE." },
            { q: "Can an Irish Driving License be used for KYC if the user lives in Spain?", a: ["Yes", "No"], c: 1, e: "Driving licenses are usually only valid for ID in the country where they were issued and where the user resides." },
            { q: "In Ireland, what is the 'CORE' extract used for?", a: ["Personal Credit Score", "Accessing CRO company data", "Checking US Nexus", "Verifying NIE"], c: 1, e: "CORE (Companies Online Registration Environment) is the portal used to pull Irish registry data." },
            { q: "Can a business be onboarded if a director resides in an EU High-Risk country?", a: ["Yes, with no limits", "No, it is prohibited", "Only if they have a second ID", "Only if the company is US-based"], c: 1, e: "Residency in high-risk jurisdictions is a major red flag and often leads to rejection." },
            { q: "True or False: Revolut US can onboard Trusts.", a: ["True", "False"], c: 1, e: "Under current eligibility criteria, Trusts are considered complex structures and are generally not supported." }
        ];

        let currentQuestion = 0;
        let score = 0;
        let answered = false;

        const startScreen = document.getElementById('start-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        const startBtn = document.getElementById('start-btn');
        const nextBtn = document.getElementById('next-btn');
        const restartBtn = document.getElementById('restart-btn');
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const feedback = document.getElementById('feedback');
        const feedbackText = document.getElementById('feedback-text');
        const progress = document.getElementById('progress');
        const questionCount = document.getElementById('question-count');
        const scoreDisplay = document.getElementById('score-display');
        const finalScore = document.getElementById('final-score');
        const resultMessage = document.getElementById('result-message');

        function initQuiz() {
            startScreen.classList.add('hidden');
            resultScreen.classList.add('hidden');
            quizScreen.classList.remove('hidden');
            currentQuestion = 0;
            score = 0;
            updateScore();
            showQuestion();
        }

        function showQuestion() {
            answered = false;
            nextBtn.classList.add('hidden');
            feedback.classList.add('hidden');
            
            const q = quizData[currentQuestion];
            questionText.innerText = q.q;
            questionCount.innerText = `Question ${currentQuestion + 1} / ${quizData.length}`;
            progress.style.width = `${((currentQuestion) / quizData.length) * 100}%`;

            optionsContainer.innerHTML = '';
            q.a.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left p-4 rounded-xl border-2 border-slate-200 hover:border-indigo-400 hover:bg-indigo-50 transition font-medium text-slate-700";
                btn.innerText = option;
                btn.onclick = () => checkAnswer(index);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(index) {
            if (answered) return;
            answered = true;
            
            const q = quizData[currentQuestion];
            const buttons = optionsContainer.querySelectorAll('button');
            
            if (index === q.c) {
                score++;
                buttons[index].classList.add('correct');
                showFeedback(true, q.e);
            } else {
                buttons[index].classList.add('incorrect');
                buttons[q.c].classList.add('correct');
                showFeedback(false, q.e);
            }

            buttons.forEach(btn => btn.disabled = true);
            updateScore();
            nextBtn.classList.remove('hidden');
            
            if (currentQuestion === quizData.length - 1) {
                nextBtn.innerText = "See Results";
            } else {
                nextBtn.innerText = "Next Question";
            }
        }

        function showFeedback(isCorrect, explanation) {
            feedback.classList.remove('hidden');
            if (isCorrect) {
                feedback.className = "rounded-xl p-4 mb-6 bg-emerald-50 border border-emerald-200 text-emerald-800";
                feedbackText.innerHTML = `<span class="font-bold">✓ Correct!</span><br><span class="text-sm">${explanation}</span>`;
            } else {
                feedback.className = "rounded-xl p-4 mb-6 bg-rose-50 border border-rose-200 text-rose-800";
                feedbackText.innerHTML = `<span class="font-bold">✗ Incorrect</span><br><span class="text-sm">${explanation}</span>`;
            }
        }

        function updateScore() {
            scoreDisplay.innerText = `Score: ${score}`;
        }

        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < quizData.length) {
                showQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            quizScreen.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            const percentage = Math.round((score / quizData.length) * 100);
            finalScore.innerText = `${percentage}%`;
            
            if (percentage >= 90) {
                resultMessage.innerText = "Expert Level! You have a strong grasp of global compliance requirements.";
                document.getElementById('score-circle').style.borderColor = "#10b981";
            } else if (percentage >= 70) {
                resultMessage.innerText = "Good job! You're ready for most cases, but keep the guide handy.";
                document.getElementById('score-circle').style.borderColor = "#f59e0b";
            } else {
                resultMessage.innerText = "Review Required. Please go through the country specific guidelines again.";
                document.getElementById('score-circle').style.borderColor = "#ef4444";
            }
        }

        startBtn.onclick = initQuiz;
        nextBtn.onclick = nextQuestion;
        restartBtn.onclick = initQuiz;
    </script>
</body>
</html>
